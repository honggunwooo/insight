<!doctype html>
<html>
<head><meta charset="utf-8"><title>Insight Chat Test</title></head>
<body>
  <h1>Insight Chat – Test</h1>
  <div>
    채널: <input id="ch" value="general">
    <button id="join">채널 입장</button>
  </div>
  <div id="log" style="margin:12px 0; padding:8px; border:1px solid #ddd; height:220px; overflow:auto;"></div>
  <input id="msg" placeholder="메시지 입력" style="width:70%">
  <button id="send">보내기</button>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
    const socket = io('http://localhost:4000');

    const log = (t) => {
      const d = document.createElement('div');
      d.textContent = t;
      const box = document.getElementById('log');
      box.appendChild(d);
      box.scrollTop = box.scrollHeight;
    };

    const chInput = document.getElementById('ch');
    function joinNow() {
      const ch = (chInput.value || 'general').trim();
      socket.emit('join_channel', { channel: ch }, (ack) => {
        if (ack?.ok) log(`[joined] ${ch}`);
      });
    }

    socket.on('connect', () => { log(`✅ connected: ${socket.id}`); joinNow(); });
    socket.on('connect_error', (err) => log(`❌ connect_error: ${err.message}`));

    document.getElementById('join').onclick = joinNow;

    document.getElementById('send').onclick = () => {
      const ch = (chInput.value || 'general').trim();
      const val = document.getElementById('msg').value;
      if (!val) return;
      socket.emit('send_message', { channel: ch, content: val }, (ack) => {
        if (!ack?.ok) log(`❌ send failed: ${ack?.error || 'unknown'}`);
      });
      document.getElementById('msg').value = '';
    };

    socket.on('new_message', (m) => log(`[${m.channel}] ${m.content}`));
  </script>
</body>
</html>
